services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-akshay}
      MYSQL_DATABASE: buythings_db
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      
  backend:
    build: ./ecom-backend/apple-main/ecom-project
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/buythings_db?useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-akshay}
      JWT_SECRET: ${JWT_SECRET:-BuyThingsSecretKey2024BuyThingsSecretKey2024BuyThingsSecretKey2024}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8080:8080"
      
  frontend:
    build: ./ecom-frontend/ecom-frontend-5-main
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
