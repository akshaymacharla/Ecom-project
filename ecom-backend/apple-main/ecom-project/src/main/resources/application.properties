spring.application.name=ecom-project

# ─────────────────────────────────────────────
# MySQL DataSource
# Set these as environment variables on your system / cloud platform:
#   DB_URL      = jdbc:mysql://localhost:3306/buythings_db
#   DB_USERNAME = root
#   DB_PASSWORD = yourpassword
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/buythings_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:akshay}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────
# JPA / Hibernate
# 'update'  → safe for development  (auto-creates/alters tables)
# 'validate'→ recommended for production (does NOT touch schema)
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
# Disable H2-specific deferred init (not needed with MySQL)
# spring.jpa.defer-datasource-initialization=true

# ─────────────────────────────────────────────
# JWT Configuration
# Set JWT_SECRET as an environment variable in production.
# The default below is for LOCAL development only — never push a real secret.
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:BuyThingsSecretKey2024VeryLongAndSecureKeyForJWTSigning123456789}
jwt.expiration=86400000

# ─────────────────────────────────────────────
# Razorpay Configuration
# Set these as environment variables on your system / cloud platform:
#   RAZORPAY_KEY_ID     = rzp_test_Sz3HUeNh4GLW0K
#   RAZORPAY_KEY_SECRET = oYBunQqSdEBpzzSnvokqTVcy
# ─────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# ─────────────────────────────────────────────
# File Upload
# ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─────────────────────────────────────────────
# Actuator (optional, useful for health checks on cloud)
# ─────────────────────────────────────────────
# management.endpoints.web.exposure.include=health,info

# ─────────────────────────────────────────────
# Mail Configuration (Phase 3)
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true