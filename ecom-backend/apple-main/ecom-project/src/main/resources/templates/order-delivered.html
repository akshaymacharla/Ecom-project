<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Delivered</title>
    <style>
        body { font-family: 'Outfit', sans-serif; color: #1f2937; background-color: #f3f4f6; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #10b981, #047857); padding: 40px 20px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 700; }
        .body { padding: 40px 30px; line-height: 1.6; }
        .body h2 { color: #111827; margin-top: 0; }
        .footer { background-color: #f9fafb; padding: 20px; text-align: center; font-size: 14px; color: #6b7280; border-top: 1px solid #e5e7eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Delivered!</h1>
        </div>
        <div class="body">
            <h2>Hi, <span th:text="${name}">Customer</span>!</h2>
            <p>Your order #<span th:text="${order.id}">123</span> has been successfully delivered. Thank you for shopping with us!</p>
            <p><strong>Total Amount:</strong> ₹<span th:text="${order.totalAmount}">0.00</span></p>
            <p>If you have any questions or feedback, please write a review or reach out to our customer support team.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 BuyThings. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
